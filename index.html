<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yu Shen | Robotics & Automation Engineer</title>
    
    <!-- Preload critical resources -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" as="style">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" as="style">
    
    <!-- CSS with fallback handling -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
          integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer" />
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" 
          rel="stylesheet">
    
    <!-- Inline critical CSS -->
    <style>
        :root {
            --primary-color: #0a0a1a;
            --secondary-color: #00f7ff;
            --accent-color: #ff00aa;
            --text-color: #e6e6e6;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Emergency visibility styles */
        .debug-overlay {
            position: fixed;
            top: 0;
            left: 0;
            padding: 10px;
            background: rgba(0,0,0,0.8);
            color: #00ff00;
            z-index: 9999;
            font-family: monospace;
            border-bottom-right-radius: 10px;
            font-size: 14px;
        }
        
        /* Basic header styles as fallback */
        header {
            background: linear-gradient(135deg, #0f1123, #080a15);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        
        h1 {
            color: var(--secondary-color);
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>
    <!-- Debug overlay -->
    <div class="debug-overlay">
        GitHub Pages Debug Mode | DOM Loaded
    </div>

    <header>
        <h1>YU SHEN</h1>
        <p>Robotics & Automation Engineer</p>
    </header>

    <main style="flex: 1; padding: 20px;">
        <section>
            <h2>TEST SECTION</h2>
            <div style="background: rgba(0,247,255,0.1); padding: 20px; border-radius: 10px; border: 1px solid var(--secondary-color);">
                <p>If you can see this colored box, the basic styling is working.</p>
                <p style="color: var(--accent-color);">The accent color should be bright pink.</p>
            </div>
        </section>
    </main>

    <footer style="padding: 20px; text-align: center; background: var(--primary-color); border-top: 1px solid var(--secondary-color);">
        <p>© 2023 Yu Shen</p>
    </footer>

    <!-- Load remaining CSS asynchronously -->
    <link rel="stylesheet" href="styles.css" media="print" onload="this.media='all'">
    
    <!-- JavaScript with error handling -->
    <script>
        // Basic functionality check
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM fully loaded and parsed');
            
            // Check for loaded resources
            const styleSheets = Array.from(document.styleSheets);
            styleSheets.forEach(sheet => {
                try {
                    if(sheet.cssRules) {
                        console.log('Stylesheet loaded:', sheet.href);
                    }
                } catch(e) {
                    console.error('Stylesheet failed to load:', sheet.href, e);
                }
            });
            
            // Create test element to verify JS execution
            const testElement = document.createElement('div');
            testElement.textContent = 'JavaScript is working';
            testElement.style.color = 'var(--accent-color)';
            testElement.style.textAlign = 'center';
            testElement.style.padding = '10px';
            document.body.appendChild(testElement);
        });
        
        // Error reporting
        window.addEventListener('error', function(e) {
            console.error('Error:', e.message, 'in', e.filename, 'line:', e.lineno);
            document.querySelector('.debug-overlay').textContent += ' | Error: ' + e.message;
        });
    </script>
</body>
</html>
