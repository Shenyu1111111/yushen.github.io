<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yu Shen | Robotics & Automation Engineer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0a0a1a;       /* Darker space-like background */
            --secondary-color: #00f7ff;     /* Brighter cyan for sci-fi feel */
            --accent-color: #ff00aa;        /* Vibrant pink */
            --dark-color: #0f1123;          /* Dark blue */
            --darker-color: #080a15;       /* Even darker */
            --text-color: #e6e6e6;          /* Light gray */
            --text-light: #b8b8b8;          /* Lighter gray */
            --card-bg: #1e1e3a;            /* Card background with purple tint */
            --highlight: rgba(0, 247, 255, 0.1); /* Subtle highlight */
            --neon-glow: 0 0 10px rgba(0, 247, 255, 0.8);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.7;
            color: var(--text-color);
            background-color: var(--primary-color);
            scroll-behavior: smooth;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 247, 255, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 170, 0.05) 0%, transparent 20%);
            overflow-x: hidden;
        }

        /* Sci-fi animated grid background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(10, 10, 26, 0.9) 0%, rgba(10, 10, 26, 0.95) 100%),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="none" stroke="%2300f7ff" stroke-width="0.2" stroke-dasharray="2 2"/></svg>');
            background-size: 100px 100px;
            opacity: 0.3;
            z-index: -1;
            animation: gridMove 50s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 1000px 1000px; }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: var(--secondary-color);
            border-radius: 50%;
            opacity: 0.5;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) translateX(20vw); opacity: 0; }
        }
        
        /* Modern header with animated gradient */
        header {
            background: linear-gradient(135deg, var(--dark-color), var(--darker-color));
            color: white;
            padding: 6rem 0 8rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(0, 247, 255, 0.2);
            box-shadow: 0 0 50px rgba(0, 247, 255, 0.1);
        }
        
        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 247, 255, 0.1) 0%, transparent 70%);
            animation: gradientRotate 15s infinite linear;
            z-index: 0;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(transparent, var(--primary-color));
            z-index: 1;
        }
        
        @keyframes gradientRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .profile-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            position: relative;
            z-index: 2;
        }
        
        .profile-img {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: 4px solid var(--secondary-color);
            object-fit: cover;
            box-shadow: var(--neon-glow);
            margin-bottom: 1.5rem;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
        }
        
        .profile-img:hover {
            transform: scale(1.05) rotate(5deg);
            box-shadow: 0 0 40px rgba(0, 247, 255, 0.7);
        }

        .profile-img::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                transparent,
                transparent,
                transparent,
                var(--secondary-color),
                transparent,
                transparent
            );
            transform: rotate(30deg);
            animation: shine 3s infinite;
            opacity: 0.5;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(30deg); }
            100% { transform: translateX(100%) rotate(30deg); }
        }
        
        h1 {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, var(--secondary-color), var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px rgba(0, 247, 255, 0.5);
            animation: textGlow 2s infinite alternate;
        }

        @keyframes textGlow {
            0% { text-shadow: 0 0 10px rgba(0, 247, 255, 0.5); }
            100% { text-shadow: 0 0 20px rgba(0, 247, 255, 0.8), 0 0 30px rgba(255, 0, 170, 0.5); }
        }
        
        .tagline {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--text-light);
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            position: relative;
        }

        .tagline::after {
            content: '';
            display: block;
            width: 200px;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--secondary-color), transparent);
            margin: 1.5rem auto;
            animation: linePulse 3s infinite;
        }

        @keyframes linePulse {
            0% { opacity: 0.3; width: 100px; }
            50% { opacity: 1; width: 200px; }
            100% { opacity: 0.3; width: 100px; }
        }
        
        .social-links {
            margin: 2rem 0;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }
        
        .social-links a {
            color: var(--text-light);
            font-size: 1.5rem;
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .social-links a::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                transparent,
                transparent,
                transparent,
                var(--secondary-color),
                transparent,
                transparent
            );
            transform: rotate(30deg);
            transition: all 0.5s ease;
            opacity: 0;
        }
        
        .social-links a:hover {
            color: var(--secondary-color);
            transform: translateY(-5px) scale(1.1);
            background: rgba(0, 247, 255, 0.1);
            border-color: var(--secondary-color);
            box-shadow: var(--neon-glow);
        }

        .social-links a:hover::before {
            opacity: 0.5;
            animation: shine 1.5s;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--secondary-color);
            color: var(--dark-color);
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            margin: 0.5rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0, 247, 255, 0.3);
            position: relative;
            overflow: hidden;
            z-index: 1;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        
        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, var(--secondary-color), var(--accent-color));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 247, 255, 0.6);
            letter-spacing: 1.5px;
        }
        
        .btn:hover::after {
            opacity: 1;
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid var(--secondary-color);
            color: var(--secondary-color);
        }
        
        .btn-outline:hover {
            background: var(--secondary-color);
            color: var(--dark-color);
        }

        /* Holographic effect for buttons */
        .btn-holo-effect {
            position: relative;
            overflow: hidden;
        }

        .btn-holo-effect::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                transparent,
                transparent,
                transparent,
                rgba(255, 255, 255, 0.8),
                transparent,
                transparent
            );
            transform: rotate(30deg);
            animation: shine 3s infinite;
        }
        
        section {
            padding: 6rem 0;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--secondary-color), transparent);
        }
        
        .section-title {
            text-align: center;
            margin-bottom: 5rem;
            color: var(--text-color);
            position: relative;
            font-size: 2.5rem;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .section-title::after {
            content: '';
            display: block;
            width: 150px;
            height: 4px;
            background: linear-gradient(to right, var(--secondary-color), var(--accent-color));
            margin: 1.5rem auto;
            border-radius: 2px;
            box-shadow: var(--neon-glow);
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.7; width: 100px; }
            100% { opacity: 1; width: 150px; }
        }
        
        /* About section with animated border */
        #about {
            position: relative;
            padding-top: 8rem;
        }
        
        #about::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--secondary-color), transparent);
        }
        
        .about-content {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 4rem;
        }
        
        .about-text {
            flex: 1;
            min-width: 300px;
            padding: 3rem;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 247, 255, 0.2);
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .about-text::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                135deg,
                rgba(0, 247, 255, 0.05) 0%,
                transparent 50%,
                rgba(255, 0, 170, 0.05) 100%
            );
            z-index: -1;
        }
        
        .about-text:hover {
            transform: translateY(-10px) rotateY(5deg);
            box-shadow: 0 15px 40px rgba(0, 247, 255, 0.2);
            border-color: var(--secondary-color);
        }
        
        .about-text p {
            margin-bottom: 1.5rem;
            line-height: 1.8;
            position: relative;
        }

        .about-text p::after {
            content: '»';
            color: var(--secondary-color);
            margin-left: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .about-text p:hover::after {
            opacity: 1;
        }
        
        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-top: 3rem;
        }
        
        .skill {
            background: rgba(0, 247, 255, 0.1);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            color: var(--secondary-color);
            border: 1px solid rgba(0, 247, 255, 0.3);
            transition: all 0.3s ease;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        
        .skill:hover {
            background: rgba(0, 247, 255, 0.3);
            transform: translateY(-5px) scale(1.05);
            box-shadow: var(--neon-glow);
        }

        /* Floating robot animation */
        .robot-float {
            position: absolute;
            right: -100px;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            height: 300px;
            background: url('https://via.placeholder.com/300x300?text=ROBOT') center/contain no-repeat;
            opacity: 0.2;
            animation: floatUpDown 4s infinite ease-in-out;
            z-index: -1;
        }

        @keyframes floatUpDown {
            0%, 100% { transform: translateY(-50%) rotate(-5deg); }
            50% { transform: translateY(-55%) rotate(5deg); }
        }
        
        /* Projects section with 3D card effect */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 3rem;
            margin-top: 3rem;
            perspective: 1000px;
        }
        
        .project-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0, 247, 255, 0.2);
            position: relative;
            transform-style: preserve-3d;
            transform: perspective(1000px) rotateY(0deg);
        }
        
        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 247, 255, 0.1), transparent);
            z-index: 1;
            pointer-events: none;
        }

        .project-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--secondary-color);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.5s ease;
        }
        
        .project-card:hover {
            transform: translateY(-15px) rotateY(10deg) scale(1.03);
            box-shadow: 0 20px 50px rgba(0, 247, 255, 0.3);
            border-color: var(--secondary-color);
        }

        .project-card:hover::after {
            transform: scaleX(1);
        }
        
        .project-img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            transition: transform 0.8s ease;
            filter: grayscale(30%);
        }
        
        .project-card:hover .project-img {
            transform: scale(1.1) rotate(1deg);
            filter: grayscale(0%);
        }
        
        .project-info {
            padding: 2.5rem;
            position: relative;
            z-index: 2;
        }
        
        .project-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-color);
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            position: relative;
            display: inline-block;
        }

        .project-title::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--secondary-color);
            transition: width 0.5s ease;
        }

        .project-card:hover .project-title::after {
            width: 100%;
        }
        
        .project-description {
            color: var(--text-light);
            margin-bottom: 2rem;
            line-height: 1.7;
        }
        
        .project-links {
            display: flex;
            gap: 1.5rem;
        }
        
        .project-links a {
            color: var(--secondary-color);
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            position: relative;
            padding-bottom: 3px;
        }

        .project-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-color);
            transition: width 0.3s ease;
        }
        
        .project-links a:hover {
            color: var(--accent-color);
            transform: translateX(5px);
        }

        .project-links a:hover::after {
            width: 100%;
        }

        /* Binary code animation */
        .binary-code {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            opacity: 0.05;
        }

        .binary-line {
            position: absolute;
            color: var(--secondary-color);
            font-family: monospace;
            white-space: nowrap;
            animation: binaryFall linear infinite;
        }

        @keyframes binaryFall {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }
        
        /* Experience timeline */
        .experience-item {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 15px;
            margin-bottom: 3rem;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 247, 255, 0.2);
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }
        
        .experience-item:hover {
            transform: translateY(-10px) scale(1.01);
            box-shadow: 0 15px 30px rgba(0, 247, 255, 0.2);
            border-color: var(--secondary-color);
        }
        
        .experience-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(to bottom, var(--secondary-color), var(--accent-color));
            box-shadow: var(--neon-glow);
        }

        .experience-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                135deg,
                rgba(0, 247, 255, 0.05) 0%,
                transparent 50%,
                rgba(255, 0, 170, 0.05) 100%
            );
            z-index: -1;
        }
        
        .experience-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1.5rem;
        }
        
        .experience-title {
            font-size: 1.5rem;
            color: var(--text-color);
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }
        
        .experience-date {
            color: var(--secondary-color);
            font-weight: 600;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }
        
        .experience-company {
            font-weight: 600;
            color: var(--accent-color);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1.1rem;
        }
        
        .experience-description {
            color: var(--text-light);
            line-height: 1.8;
            position: relative;
        }

        .experience-description::before {
            content: '>';
            color: var(--secondary-color);
            margin-right: 0.5rem;
        }

        /* Holographic divider */
        .holo-divider {
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, 
                transparent, 
                var(--secondary-color), 
                var(--accent-color), 
                transparent);
            margin: 4rem 0;
            position: relative;
            opacity: 0.5;
        }

        .holo-divider::after {
            content: '';
            position: absolute;
            top: -5px;
            left: 0;
            width: 100%;
            height: 12px;
            background: linear-gradient(to right, 
                transparent, 
                rgba(0, 247, 255, 0.3), 
                rgba(255, 0, 170, 0.3), 
                transparent);
            filter: blur(5px);
        }
        
        /* Contact form with floating labels */
        .contact-form {
            max-width: 700px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 4rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 247, 255, 0.2);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
            transform-style: preserve-3d;
            transform: perspective(1000px);
        }

        .contact-form::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                135deg,
                rgba(0, 247, 255, 0.05) 0%,
                transparent 50%,
                rgba(255, 0, 170, 0.05) 100%
            );
            z-index: -1;
        }

        .contact-form:hover {
            box-shadow: 0 15px 40px rgba(0, 247, 255, 0.2);
            border-color: var(--secondary-color);
        }
        
        .form-group {
            margin-bottom: 2.5rem;
            position: relative;
        }
        
        label {
            display: block;
            margin-bottom: 0.8rem;
            font-weight: 600;
            color: var(--text-color);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }
        
        input, textarea {
            width: 100%;
            padding: 1.2rem;
            background: rgba(10, 10, 26, 0.5);
            border: 1px solid rgba(0, 247, 255, 0.3);
            border-radius: 8px;
            font-family: inherit;
            color: var(--text-color);
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(0, 247, 255, 0.3);
            background: rgba(0, 247, 255, 0.05);
        }
        
        textarea {
            min-height: 200px;
            resize: vertical;
        }

        /* Sci-fi input effects */
        .form-group::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--secondary-color);
            transition: width 0.3s ease;
        }

        .form-group:focus-within::after {
            width: 100%;
        }

        /* Holographic submit button */
        .contact-form button[type="submit"] {
            width: 100%;
            padding: 1.2rem;
            background: var(--secondary-color);
            color: var(--dark-color);
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 247, 255, 0.5);
        }

        .contact-form button[type="submit"]::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                transparent,
                transparent,
                transparent,
                rgba(255, 255, 255, 0.8),
                transparent,
                transparent
            );
            transform: rotate(30deg);
            animation: shine 3s infinite;
            opacity: 0.5;
        }

        .contact-form button[type="submit"]:hover {
            background: var(--accent-color);
            box-shadow: 0 0 25px rgba(255, 0, 170, 0.7);
            transform: translateY(-3px);
        }
        
        /* Footer with animated gradient border */
        footer {
            background: var(--darker-color);
            color: var(--text-light);
            text-align: center;
            padding: 4rem 0;
            position: relative;
            margin-top: 6rem;
        }
        
        footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--secondary-color), var(--accent-color), transparent);
            box-shadow: 0 0 20px rgba(0, 247, 255, 0.5);
        }

        footer::after {
            content: '';
            position: absolute;
            top: -100px;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(transparent, var(--darker-color));
            z-index: 1;
        }
        
        footer p {
            margin-bottom: 1rem;
            position: relative;
            z-index: 2;
        }

        footer .footer-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        footer .footer-links a {
            color: var(--text-light);
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            padding-bottom: 5px;
        }

        footer .footer-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--secondary-color);
            transition: width 0.3s ease;
        }

        footer .footer-links a:hover {
            color: var(--secondary-color);
        }

        footer .footer-links a:hover::after {
            width: 100%;
        }

        /* Floating back to top button */
        .back-to-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            background: var(--secondary-color);
            color: var(--dark-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.5rem;
            box-shadow: 0 0 15px rgba(0, 247, 255, 0.5);
            transition: all 0.3s ease;
            z-index: 100;
            opacity: 0;
            transform: translateY(20px);
        }

        .back-to-top.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .back-to-top:hover {
            background: var(--accent-color);
            box-shadow: 0 0 25px rgba(255, 0, 170, 0.7);
            transform: translateY(-5px) scale(1.1);
        }
        
        /* Responsive design */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            
            .tagline {
                font-size: 1.2rem;
            }
            
            .section-title {
                font-size: 2rem;
                margin-bottom: 3rem;
            }

            .section-title::after {
                width: 100px;
            }
            
            .about-content {
                flex-direction: column;
            }

            .robot-float {
                display: none;
            }
            
            .projects-grid {
                grid-template-columns: 1fr;
            }
            
            section {
                padding: 4rem 1rem;
            }
            
            .contact-form {
                padding: 2rem;
            }

            .experience-item {
                padding: 2rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
            }

            .profile-img {
                width: 180px;
                height: 180px;
            }

            .btn {
                padding: 0.7rem 1.5rem;
                font-size: 0.8rem;
            }
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 12px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--dark-color);
            border-left: 1px solid rgba(0, 247, 255, 0.1);
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(var(--secondary-color), var(--accent-color));
            border-radius: 5px;
            border: 2px solid var(--dark-color);
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-color);
        }
